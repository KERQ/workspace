# policy only — no secret values
secret_scopes:
  homeserver-core:
    owns:
      - tailscale_auth_key
      - backup_repository_key
      - infisical_token
    plaintext_allowed: false

  homeserver-services:
    owns:
      - openclaw_gateway_token
      - litellm_master_key
      - forgejo_bot_token
      - paperclip_secrets
    plaintext_allowed: false

  life-platform:
    owns:
      - mosquitto_password
      - home_assistant_tokens
    plaintext_allowed: false

  investment-research:
    owns:
      - broker_api_keys
      - market_data_api_keys
    github_mirror_allowed: false
    plaintext_allowed: false
