# runtime paths on hosts (no secrets)
# EPIC-005 — completed on G2 2026-05-16

runtime_paths:
  ansible_variables:
    - homeserver_runtime_root
    - homeserver_g2_config_dir
    - homeserver_infisical_path
    - homeserver_legacy_g2_config_dir

  canonical_defaults:
    homeserver_runtime_root: /opt/homeserver-services
    homeserver_infisical_path: /opt/homeserver-services/infisical
    homeserver_g2_config_dir: /opt/homeserver-services/g2-config

  target:
    root: /opt/homeserver-services
    g2_config: /opt/homeserver-services/g2-config
    trading_scripts: /opt/homeserver-services/scripts/trading
    infisical: /opt/homeserver-services/infisical

  g2_on_host:
    canonical_root: /opt/homeserver-services
    backward_symlinks_until_005e:
      - /opt/homeserver-ansible-repo -> /opt/homeserver-services
      - /opt/homeserver-ansible/infisical -> /opt/homeserver-services/infisical
    cutover_bak_dirs_pending_cleanup:
      - /opt/homeserver-ansible-repo.bak-20260516-211434
      - /opt/homeserver-ansible-infisical.bak-20260516-211434
    seagate_backups: /mnt/seagate/backups/epic-005-g2-runtime-path

  t630:
    homeserver_ansible_paths: absent
    smart_home_root: /opt/life-platform-t630
    smart_home_config: /opt/life-platform-t630/t630-config
    openclaw_control_plane: /opt/openclaw-control-plane
    note: EPIC-005 nie migruje life-platform-t630 ani openclaw-control-plane

migration:
  epic_status: done_pending_host_cleanup
  phases:
    "005A": ansible_variable_refactor
    "005B": g2_cutover_with_symlinks
    "005D": ansible_deploy_canonical_paths
    "005E": docs_done_host_cleanup_pending
  strategy: phased_with_backward_symlink
  primary_host: g2
  hosts_in_scope: [g2]
  hosts_out_of_scope: [t630]
